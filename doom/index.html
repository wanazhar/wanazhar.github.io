<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffcce0" />
    <title>DOOM Kawaii ♡</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <script src="./main.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <h1>DOOM Kawaii ♡</h1>
        <div class="status-indicator">
          <div id="statusDot" class="dot"></div>
          <span id="statusTitle">Loading...</span>
        </div>
      </header>

      <section class="game-container" id="gameShell">
        <div id="dos"></div>

        <div class="empty-state" id="emptyState">
          <h2>Welcome to the cute portal! ૮ ˶ᵔ ᵕ ᵔ˶ ა</h2>
          <p>Ready to blast some demons in style?</p>
          <button class="kawaii-btn primary" id="emptyStartButton">Start Game! ♡</button>
        </div>

        <div class="mini-controls">
          <button class="kawaii-btn mini-btn" id="touchToggleButton">Touch Pad</button>
          <button class="kawaii-btn mini-btn" id="fullscreenButton">Full Screen</button>
          <button class="kawaii-btn mini-btn" id="saveButton">Save</button>
          <button class="kawaii-btn mini-btn" id="loadButton">Load</button>
        </div>

        <div class="touch-overlay hidden" id="touchOverlay">
          <div class="touch-group d-pad">
            <div class="touch-btn up" data-key="ArrowUp">▲</div>
            <div class="touch-btn left" data-key="ArrowLeft">◀</div>
            <div class="touch-btn right" data-key="ArrowRight">▶</div>
            <div class="touch-btn down" data-key="ArrowDown">▼</div>
          </div>
          <div class="touch-group center-mini">
            <div class="touch-btn mini-action" data-key="Escape">ESC</div>
            <div class="touch-btn mini-action" data-key="Enter">ENT</div>
            <div class="touch-btn mini-action" data-key="Tab">MAP</div>
          </div>
          <div class="touch-group action-pad">
            <div class="touch-btn strafe" data-key="AltLeft">STR</div>
            <div class="touch-btn fire" data-key="ControlLeft">HIT</div>
            <div class="touch-btn use" data-key="Space">USE</div>
            <div class="touch-btn dash" data-key="ShiftLeft">RUN</div>
          </div>
        </div>
      </section>

      <div class="controls-bar">
        <button class="kawaii-btn primary" id="startButton">Play DOOM ♡</button>
        <button class="kawaii-btn" id="altStartButton">Alt Version</button>
        <label class="kawaii-btn" for="bundlePicker">
          Load .jsdos
          <input id="bundlePicker" type="file" accept=".jsdos,.zip" class="hidden" />
        </label>
      </div>

      <p id="legal">
        DOOM Shareware v1.9. ૮ • ﻌ • ა <br>
        Built with js-dos. Stay cute, slayer.
      </p>
    </main>

  </body>
</html>
